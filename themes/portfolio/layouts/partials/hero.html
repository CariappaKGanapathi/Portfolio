<section class="hero" id="about">
  <div class="container">
    <p class="hero-greeting">Hi, I'm</p>
    <h1 class="hero-name">{{ .Site.Params.name }}</h1>
    <p class="hero-role">{{ .Site.Params.role }}</p>
    <p class="hero-tagline">{{ .Site.Params.tagline }}</p>
    <div class="hero-actions">
      <a href="#contact" role="button" data-variant="primary">Get in touch</a>
      <a href="#projects" role="button" class="outline">View projects</a>
    </div>
  </div>
</section>
